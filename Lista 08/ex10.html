<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex10</title>
</head>
<body>
    <div>
        <label for="">Digite Quantas voltas o carro vai dar nessa corrida: </label>
        <input type="text" id="ipt_voltas">
        <button onclick="correr()">
            Iniciar corrida!
        </button>
    </div>
    <div id="resultado">

    </div>
</body>

<script>
    function correr() {
        let voltas_carro = Number(ipt_voltas.value);
        let contador = 0;

        while (contador <= voltas_carro) {
           resultado.innerHTML += `Carro dando a ${contador} volta <br>`;  

           contador ++
        }
        resultado.innerHTML += `<br> Corrida finalizada!`;  
    }
</script>

</html>
