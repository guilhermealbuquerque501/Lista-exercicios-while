<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex6</title>
</head>

<body>
    <div>
        <label for=""></label>
        <input type="text" id="ipt_contador">
        <button onclick="contar()">
            Adoro múltiplos de 5
        </button>
    </div>
    <div id="resultado">

    </div>
</body>
<script>
    function contar() {
        numero = Number(ipt_contador.value);
        resultado.innerHTML = "";
        contador = 0

        if (numero >= 20 && numero <= 100) {
            while (contador <= numero) {
                if (contador % 5 == 0) {
                    resultado.innerHTML += `numero divisivel por 5: ${contador} <br>`;
                }
                contador ++
            }
        }   
        else {
            resultado.innerHTML += "Digite um número válido"; 
        }
    }
</script>
</html>
