<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex9</title>
</head>

<body>
    <label for="ipt_num">Digite o limite de números pares exibidos </label>
    <input type="text" id="ipt_num">
    <button onclick="calcular_pares()">
        S2 Pares
    </button>
    <br>
    <div id="resultado">

    </div>
</body>
<script>
    function calcular_pares() {
        resultado.innerHTML = "";
        let limite_pares = Number(ipt_num.value);
        let contador = 0;

        while (contador <= limite_pares) {
            
            if (contador % 2 == 0) {
                resultado.innerHTML += `Um dos pares até ${limite_pares} é ${contador}<br>`;
            }
            contador ++;
        }
    }
</script>
</html>
